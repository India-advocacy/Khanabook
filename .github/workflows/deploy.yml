name: Deploy KhanaBook SaaS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/kbook.iadv.cloud
            git fetch origin main
            git reset --hard origin/main
            
            cd server
            mvn clean install -DskipTests
            
            pkill -f "spring-boot:run" || true
            pkill -f "saas-backend" || true
            nohup mvn spring-boot:run > /tmp/kbook_server.log 2>&1 &
            sleep 10
            tail -n 20 /tmp/kbook_server.log
          EOF

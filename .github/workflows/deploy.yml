name: Deploy KhanaBook SaaS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          debug: true
          script: |
            cd /var/www/kbook.iadv.cloud
            git fetch origin main
            git reset --hard origin/main
            
            # Re-apply production settings (they are ignored by git)
            # We already have them on the VPS, so we just build
            cd server
            mvn clean install -DskipTests
            
            # Restart the service
            pkill -f "spring-boot:run" || true
            pkill -f "saas-backend" || true
            nohup mvn spring-boot:run > /tmp/kbook_server.log 2>&1 &
            sleep 10
            tail -n 20 /tmp/kbook_server.log

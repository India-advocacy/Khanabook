# ============================================================
# PostgreSQL — credentials from environment variables ONLY
# Never hardcode passwords in this file.
# Set these in your shell, Docker env, or CI/CD secrets:
#   DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/khanabook_saas}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

# Flyway Database Migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Google Auth
google.client.id=${GOOGLE_CLIENT_ID}

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
# DO NOT use ddl-auto=update in production — use Flyway or Liquibase instead
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Server
server.port=8080
server.servlet.context-path=/api/v1

# JWT — MUST be set via environment variable in production
jwt.secret=${JWT_SECRET:poiuytrewqasdfghjklmnbvcxz1234567}
jwt.expiration.ms=36000000

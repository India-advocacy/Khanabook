# ============================================================
# PostgreSQL — credentials from environment variables ONLY
# Never hardcode passwords in this file.
# Set these in your shell, Docker env, or CI/CD secrets:
#   DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/khanabook_saas}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
# DO NOT use ddl-auto=update in production — use Flyway or Liquibase instead
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Server
server.port=8080
server.servlet.context-path=/api/v1

# JWT — MUST be set via environment variable in production
jwt.secret=${JWT_SECRET:mySuperSecretKey1234567890-32chars-min}
jwt.expiration.ms=36000000

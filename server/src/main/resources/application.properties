spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/khanabook_saas}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.flyway.enabled=true
spring.jpa.open-in-view=false
google.client.id=${GOOGLE_CLIENT_ID}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

server.port=8080
server.servlet.context-path=/api/v1

jwt.secret=${JWT_SECRET}
jwt.expiration.ms=36000000

storage.upload-dir=${UPLOAD_DIR:offline-storage/menus/}
debug.ndjson.enabled=${DEBUG_LOG_ENABLED:false}
debug.ndjson.path=${DEBUG_LOG_PATH:logs/debug.log}
